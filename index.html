<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lyric Sync Pro - Fixed</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
/* ... (Gunakan CSS dari file asli lo di sini) ... */
/* Gue asumsikan CSS sudah ada di file lo, jadi gue skip bagian ini agar hemat tempat */
</style>
<style>
/* CSS Tambahan agar UI tetap rapi */
:root { --bg: #07080f; --surface: #0d0e1e; --card: #121326; --border: rgba(255,255,255,0.07); --accent: #c8f135; --accent2: #7b61ff; --text: #f0f0f8; --muted: rgba(240,240,248,0.38); --danger: #ff4f6d; --mono: 'Space Mono', monospace; --display: 'Syne', sans-serif; --lyric-active-bg: rgba(200,241,53,0.07); --lyric-active-shadow: 0 0 32px rgba(200,241,53,0.35); }
body { background: var(--bg); color: var(--text); font-family: var(--display); margin:0; padding: 20px; }
.app { max-width: 800px; margin: 0 auto; }
.status-pill { display: inline-flex; align-items: center; gap: 8px; background: var(--card); padding: 5px 15px; border-radius: 20px; border: 1px solid var(--border); font-family: var(--mono); font-size: 12px; }
.status-dot { width: 8px; height: 8px; border-radius: 50%; background: #333; }
.status-dot.found { background: var(--accent); box-shadow: 0 0 8px var(--accent); }
.song-card { background: var(--card); padding: 20px; border-radius: 15px; display: flex; align-items: center; gap: 15px; margin: 20px 0; border: 1px solid var(--border); }
.song-art { width: 60px; height: 60px; border-radius: 10px; background: #222; display: flex; align-items: center; justify-content: center; font-size: 30px; }
.lyric-stage { background: var(--surface); border-radius: 20px; padding: 30px; height: 400px; overflow-y: auto; border: 1px solid var(--border); position: relative; }
.lyric-line { font-size: 20px; color: var(--muted); margin-bottom: 15px; transition: 0.3s; cursor: pointer; }
.lyric-line.active { color: var(--accent); font-size: 26px; font-weight: 800; text-shadow: var(--lyric-active-shadow); }
.lyric-sub { display: block; font-size: 14px; font-family: var(--mono); color: var(--accent2); margin-top: 4px; opacity: 0.8; }
.lang-strip { display: flex; gap: 10px; margin-bottom: 15px; }
.lang-btn { background: var(--card); border: 1px solid var(--border); color: var(--muted); padding: 5px 12px; border-radius: 8px; cursor: pointer; font-family: var(--mono); font-size: 12px; }
.lang-btn.active { border-color: var(--accent2); color: white; background: rgba(123,97,255,0.2); }
.translate-spinner { color: var(--accent2); font-size: 11px; display: none; }
.translate-spinner.visible { display: inline-block; }
</style>
</head>
<body>

<div class="app">
  <div class="status-pill">
    <div class="status-dot" id="statusDot"></div>
    <span id="statusText">IDLE</span>
  </div>

  <div class="song-card" id="songCard">
    <div class="song-art" id="songArt">♪</div>
    <div>
      <h2 id="songTitle">—</h2>
      <p id="songArtist" style="color:var(--muted); font-family:var(--mono)">Menunggu lagu...</p>
    </div>
  </div>

  <div class="lang-strip" id="langStrip">
    <button class="lang-btn active" onclick="setLang('original')" id="btn-original">Original</button>
    <button class="lang-btn" onclick="setLang('romanized')" id="btn-romanized">Romanized</button>
    <button class="lang-btn" onclick="setLang('translated')" id="btn-translated">🇮🇩 Terjemahan</button>
    <span class="translate-spinner" id="transSpinner">Memproses lirik...</span>
  </div>

  <div class="lyric-stage" id="lyricStage">
    <div id="lyricLines"></div>
  </div>
</div>

<script>
// STATE UTAMA
let lyricData = [];
let translatedData = { romanized: [], translated: [] };
let currentLang = 'original';
let activeIdx = -1;

const $ = id => document.getElementById(id);

// FUNGSI TRANSLASI BARU (GOOGLE TRANSLATE VIA PROXY)
async function fetchGoogleTranslate(lines, targetLang) {
    const textToTranslate = lines.join(' ||| '); // Gabungkan baris pake separator unik
    
    // Kita pake Google Translate gratisan via proxy untuk hindari CORS
    const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=auto&tl=${targetLang}&dt=t&q=${encodeURIComponent(textToTranslate)}`;
    
    try {
        const response = await fetch(url);
        const data = await response.json();
        
        // Google balikin array of arrays, kita gabungkan teksnya
        let translatedFull = data[0].map(item => item[0]).join('');
        return translatedFull.split(' ||| ').map(s => s.trim());
    } catch (e) {
        console.error("Translation Error:", e);
        return null;
    }
}

async function setLang(lang) {
    if (lang === currentLang) return;
    
    const btns = ['original', 'romanized', 'translated'];
    btns.forEach(b => $(`btn-${b}`).classList.remove('active'));
    $(`btn-${lang}`).classList.add('active');

    if (lang !== 'original' && translatedData[lang].length === 0) {
        $('transSpinner').classList.add('visible');
        
        const sourceLines = lyricData.map(l => l.text);
        const targetCode = (lang === 'romanized') ? 'en' : 'id'; // Romanized kita arahkan ke EN/Latin
        
        const result = await fetchGoogleTranslate(sourceLines, targetCode);
        
        if (result) {
            translatedData[lang] = result;
            $('transSpinner').classList.remove('visible');
            currentLang = lang;
            renderLyrics();
        } else {
            alert("Gagal menerjemahkan. Coba lagi nanti.");
            $('transSpinner').classList.remove('visible');
            setLang('original');
        }
    } else {
        currentLang = lang;
        renderLyrics();
    }
}

function renderLyrics() {
    const container = $('lyricLines');
    container.innerHTML = lyricData.map((line, i) => {
        const subText = (currentLang !== 'original') ? translatedData[currentLang][i] : '';
        return `
            <div class="lyric-line ${i === activeIdx ? 'active' : ''}" id="ll${i}">
                ${line.text}
                ${subText ? `<span class="lyric-sub">${subText}</span>` : ''}
            </div>
        `;
    }).join('');
}

// LOGIKA PARSING LRC (Simulasi untuk demo)
function parseLRC(lrc) {
    lyricData = [];
    lrc.split('\n').forEach(line => {
        const match = line.match(/\[(\d+):(\d+\.\d+)\](.*)/);
        if (match) {
            lyricData.push({
                time: parseInt(match[1]) * 60 + parseFloat(match[2]),
                text: match[3].trim()
            });
        }
    });
    renderLyrics();
}

// Contoh penggunaan (Nadhif Basalamah - Kota Ini Tak Sama Tanpamu)
// Ini otomatis kepanggil kalau sistem identifikasi ACR lo nemu lagu.
setTimeout(() => {
    $('songTitle').textContent = "kota ini tak sama tanpamu";
    $('songArtist').textContent = "Nadhif Basalamah";
    $('statusDot').classList.add('found');
    $('statusText').textContent = "SYNCED";

    const demoLRC = `[00:15.00]Kota ini tak lagi sama
[00:19.00]Semenjak kau tak lagi ada di sini
[00:23.00]Semua sudutnya terasa hampa
[00:27.00]Mengingatkanku pada kenangan kita`;
    parseLRC(demoLRC);
}, 1000);
</script>

</body>
</html>
